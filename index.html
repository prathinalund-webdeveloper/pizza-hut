<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Hut Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

/* Header */
header{
    background:#d6001c;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:30px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
}

nav a:hover{
    color:yellow;
}

/* Hero Section */
.hero{
    text-align:center;
    padding:60px 20px;
    background:url('https://images.unsplash.com/photo-1513104890138-7c749659a591') center/cover;
}

.hero h2{
    font-size:50px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    margin-bottom:20px;
}

.hero button{
    padding:12px 25px;
    font-size:18px;
    background:#d6001c;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.hero button:hover{
    background:#ff0022;
}

/* Products */
.products{
    padding:50px;
    text-align:center;
}

.products h2{
    font-size:40px;
    margin-bottom:30px;
}

.product-box{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    background:#222;
    width:280px;
    padding:15px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:15px 0 10px;
}

.card p{
    color:#ccc;
    margin-bottom:10px;
}

.card button{
    padding:10px 20px;
    border:none;
    background:#d6001c;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

/* Footer */
footer{
    background:#d6001c;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

/* Responsive */
@media(max-width:768px){
    header{
        flex-direction:column;
    }

    nav{
        margin-top:10px;
    }

    .hero h2{
        font-size:35px;
    }
}
</style>
</head>
<body>

<header>
    <h1>🍕 Pizza Hut</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Delicious Pizza For you</h2>
    <p>Fresh, Hot & Cheesy Pizza Delivered Fast</p>
    <button>Order Now</button>
</section>

<section class="products">
    <h2>Our Best Pizzas</h2>

    <div class="product-box">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cGVwcGVyb25pJTIwcGl6emF8ZW58MHx8MHx8fDA%3D" alt="">
            <h3>Pepperoni Pizza</h3>
            <p>$12.99</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65" alt="">
            <h3>Cheese Pizza</h3>
            <p>$10.99</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8dmVnZ2llJTIwcGl6emF8ZW58MHx8MHx8fDA%3D" alt="">
            <h3>Veggie Pizza</h3>
            <p>$11.99</p>
            <button>Buy Now</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Pizza Hut Clone | Designed by Prathina</p>
</footer>

</body>
</html>
